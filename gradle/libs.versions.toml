# https://fabricmc.net/develop/

[versions]
# Common
jspecify = "1.0.0"
ofrat = "1.0.0"
utils = "1.4.10"
commonsCompress = "1.28.0"
tomlj = "1.1.1"
semver = "0.10.2" # semver4j
sqliteJdbc = "3.49.1.0" # SQLite + HikariCP + Exposed
bstats = "3.2.1"

# Plugin versions
loom = "1.16.0-alpha.13"
moddev = "2.0.141"
shadow = "9.4.1"
kotlin = "2.4.0-RC"
paperweight = "2.0.0-beta.21"

# Fabric
fabricLoader = "0.19.2"
fabricApi = "0.145.4+26.1.2"
fabricMinecraft = "26.1.2"
quiltLoader = "0.30.0-beta.7"

# NeoForge
neoforge = "26.1.2.59-beta"

# Paper
paperApi = "26.1.2.build.65-stable"

[libraries]
# Common
jspecify = { module = "org.jspecify:jspecify", version.ref = "jspecify" }
ofratAnnotations = { module = "com.github.arsmotorin.ofrat:ofrat-annotations", version.ref = "ofrat" }
ofratPlugin = { module = "com.github.arsmotorin.ofrat:ofrat-plugin", version.ref = "ofrat" }
utils = { module = "me.inotsleep:utils", version.ref = "utils" }
kotlinStdlib = { module = "org.jetbrains.kotlin:kotlin-stdlib", version.ref = "kotlin" }
commonsCompress = { module = "org.apache.commons:commons-compress", version.ref = "commonsCompress" }
tomlj = { module = "org.tomlj:tomlj", version.ref = "tomlj" }
semver = { module = "com.github.zafarkhaja:java-semver", version.ref = "semver" }
sqliteJdbc = { module = "org.xerial:sqlite-jdbc", version.ref = "sqliteJdbc" }
bstats = { module = "org.bstats:bstats-bukkit", version.ref = "bstats" }

# Fabric
fabricLoader = { module = "net.fabricmc:fabric-loader", version.ref = "fabricLoader" }
fabricApi = { module = "net.fabricmc.fabric-api:fabric-api", version.ref = "fabricApi" }
fabricMinecraft = { module = "com.mojang:minecraft", version.ref = "fabricMinecraft" }
quiltLoader = { module = "org.quiltmc:quilt-loader", version.ref = "quiltLoader" }

# Paper
paperApi = { module = "io.papermc.paper:paper-api", version.ref = "paperApi" }

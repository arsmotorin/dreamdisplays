# Publishing pipeline. Runs only for explicit release tags or a manual maintainer dispatch.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      pull_request: false

  github-prerelease:
    name: Publish GitHub pre-release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: No GitHub pre-release needed
        if: needs.build.outputs.is_dev != 'true' && needs.build.outputs.is_preview != 'true'
        run: echo "Version ${{ needs.build.outputs.version }} is not a dev or preview pre-release."

      - name: Checkout repository
        if: needs.build.outputs.is_dev == 'true' || needs.build.outputs.is_preview == 'true'
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        if: needs.build.outputs.is_dev == 'true' || needs.build.outputs.is_preview == 'true'
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: build-jars-*
          path: build/libs
          merge-multiple: true

      - name: Extract preview changelog
        if: needs.build.outputs.is_preview == 'true'
        run: |
          python3 - <<'EOF'
          import re
          import sys

          with open("CHANGELOG.md") as f:
              content = f.read()

          pretty_version = "${{ needs.build.outputs.pretty_version }}"
          pattern = rf"^# {re.escape(pretty_version)}\s*\n(.*?)(?=\n# \S|\Z)"
          match = re.search(pattern, content, re.DOTALL | re.MULTILINE)

          if not match:
              with open("changelog.md", "w") as f:
                  f.write("")
              sys.exit(0)

          block = match.group(1)
          sections = re.split(r"^## ", block, flags=re.MULTILINE)
          lines = []

          for section in sections:
              if not section.strip():
                  continue

              header, _, body = section.partition("\n")
              lines.append(f"## {header.strip()}")

              for item in body.splitlines():
                  item = item.strip()
                  if item:
                      lines.append(item)

              lines.append("")

          with open("changelog.md", "w") as f:
              f.write("\n".join(lines).strip() + "\n")
          EOF

      - name: Publish dev pre-release
        if: needs.build.outputs.is_dev == 'true'
        run: |
          TAG="v${{ needs.build.outputs.version }}"
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh release create "$TAG" --repo "${{ github.repository }}" --title "${{ needs.build.outputs.pretty_version }}" --prerelease --notes "" build/libs/dreamdisplays-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish preview pre-release
        if: needs.build.outputs.is_preview == 'true'
        run: |
          TAG="v${{ needs.build.outputs.version }}"
          gh release create "$TAG" --repo "${{ github.repository }}" --title "${{ needs.build.outputs.pretty_version }}" --prerelease --notes-file changelog.md build/libs/dreamdisplays-*.jar \
          || gh release upload "$TAG" build/libs/dreamdisplays-*.jar --repo "${{ github.repository }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish ${{ matrix.task.kind }} ${{ matrix.task.mc }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        task: ${{ fromJSON(needs.build.outputs.marketplace_publish_tasks) }}
    permissions:
      contents: write

    steps:
      - name: Marketplace publishing not needed
        if: needs.build.outputs.is_marketplace_publishable != 'true'
        run: echo "Version ${{ needs.build.outputs.version }} is not marketplace-publishable."

      - name: Checkout repository
        if: needs.build.outputs.is_marketplace_publishable == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        if: needs.build.outputs.is_marketplace_publishable == 'true'
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-jars-${{ matrix.task.mc }}
          path: build/libs

      - name: Extract versions
        if: needs.build.outputs.is_marketplace_publishable == 'true'
        id: versions
        run: |
          python3 - <<'EOF'
          import os
          import re

          mc = "${{ matrix.task.mc }}"
          props = {}

          with open(f"versions/{mc}/gradle.properties") as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith("#") or "=" not in line:
                      continue

                  key, value = line.split("=", 1)
                  props[key.strip()] = value.strip()

          minecraft_version = props.get("minecraft.version", mc)
          base_mc = minecraft_version.split("-", 1)[0]
          publish_mc = "1.21.1" if base_mc == "1.21.11" else ("1.21" if base_mc == "1.21.1" else base_mc)
          display_mc = "1.21.1" if base_mc.startswith("1.21.") else base_mc
          curseforge_publishable = (
              re.fullmatch(r"\d+(?:\.\d+)*", minecraft_version) is not None
              and minecraft_version != "1.21.11"
          )

          paper_1_21 = ["1.21"] + [f"1.21.{p}" for p in range(1, 12)]
          paper_26 = ["26.1", "26.1.1", "26.1.2", "26.2"]
          paper_versions = paper_1_21 + paper_26

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"mc={mc}\n")
              f.write(f"publish_mc={publish_mc}\n")
              f.write(f"display_mc={display_mc}\n")
              f.write(f"curseforge_publishable={str(curseforge_publishable).lower()}\n")
              f.write("mc_versions<<VERSIONS_EOF\n")
              f.write(minecraft_version + "\n")
              f.write("VERSIONS_EOF\n")
              f.write("paper_versions<<VERSIONS_EOF\n")
              f.write("\n".join(paper_versions) + "\n")
              f.write("VERSIONS_EOF\n")
          EOF

      - name: Extract changelog
        if: needs.build.outputs.is_marketplace_publishable == 'true' && (needs.build.outputs.is_release == 'true' || needs.build.outputs.is_preview == 'true')
        run: |
          python3 - <<'EOF'
          import os
          import re
          import sys

          with open("CHANGELOG.md") as f:
              content = f.read()

          version = "${{ needs.build.outputs.version }}"
          pretty_version = "${{ needs.build.outputs.pretty_version }}"
          is_preview = "${{ needs.build.outputs.is_preview }}" == "true"

          pattern = rf"^# {re.escape(pretty_version)}\s*\n(.*?)(?=\n# \S|\Z)"
          match = re.search(pattern, content, re.DOTALL | re.MULTILINE)

          if not match:
              if is_preview:
                  with open("changelog.md", "w") as f:
                      f.write("")
                  sys.exit(0)

              sys.exit(f"Version {version} not found in CHANGELOG.md")

          block = match.group(1)
          sections = re.split(r"^## ", block, flags=re.MULTILINE)
          lines = []

          for section in sections:
              if not section.strip():
                  continue

              header, _, body = section.partition("\n")
              lines.append(f"## {header.strip()}")

              for item in body.splitlines():
                  item = item.strip()
                  if item:
                      lines.append(item)

              lines.append("")

          with open("changelog.md", "w") as f:
              f.write("\n".join(lines).strip() + "\n")
          EOF

      - name: Publish Paper
        if: needs.build.outputs.is_marketplace_publishable == 'true' && matrix.task.kind == 'paper'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: 'Dream Displays ${{ needs.build.outputs.pretty_version }} — Paper 1.21+'
          version: paper-${{ needs.build.outputs.version }}
          version-type: ${{ needs.build.outputs.is_preview == 'true' && 'alpha' || 'release' }}
          files: build/libs/dreamdisplays-paper-${{ needs.build.outputs.version }}.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          loaders: |
            folia
            paper
            purpur
          game-versions: ${{ steps.versions.outputs.paper_versions }}
          game-version-filter: none

      - name: Publish Fabric to Modrinth
        if: needs.build.outputs.is_marketplace_publishable == 'true' && matrix.task.kind == 'fabric'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: 'Dream Displays ${{ needs.build.outputs.pretty_version }} — Fabric ${{ matrix.task.mc }}'
          version: fabric-${{ steps.versions.outputs.publish_mc }}-${{ needs.build.outputs.version }}
          version-type: ${{ needs.build.outputs.is_preview == 'true' && 'alpha' || 'release' }}
          files: build/libs/dreamdisplays-fabric-${{ matrix.task.mc }}-${{ needs.build.outputs.version }}.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          loaders: |
            fabric
            quilt
          game-versions: ${{ steps.versions.outputs.mc_versions }}
          game-version-filter: none
          dependencies: |
            fabric-api(required){modrinth:P7dR8mSH}

      - name: Publish Fabric to CurseForge
        if: needs.build.outputs.is_marketplace_publishable == 'true' && matrix.task.kind == 'fabric' && steps.versions.outputs.curseforge_publishable == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: 'Dream Displays ${{ needs.build.outputs.pretty_version }} — Fabric ${{ matrix.task.mc }}'
          version: fabric-${{ steps.versions.outputs.publish_mc }}-${{ needs.build.outputs.version }}
          version-type: ${{ needs.build.outputs.is_preview == 'true' && 'alpha' || 'release' }}
          files: build/libs/dreamdisplays-fabric-${{ matrix.task.mc }}-${{ needs.build.outputs.version }}.jar
          changelog-file: changelog.md
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          loaders: |
            fabric
            quilt
          game-versions: ${{ steps.versions.outputs.mc_versions }}
          dependencies: |
            fabric-api(required){curseforge:306612}

      - name: Publish NeoForge to Modrinth
        if: needs.build.outputs.is_marketplace_publishable == 'true' && matrix.task.kind == 'neoforge'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: 'Dream Displays ${{ needs.build.outputs.pretty_version }} — NeoForge ${{ matrix.task.mc }}'
          version: neoforge-${{ steps.versions.outputs.publish_mc }}-${{ needs.build.outputs.version }}
          version-type: ${{ needs.build.outputs.is_preview == 'true' && 'alpha' || 'release' }}
          files: build/libs/dreamdisplays-neoforge-${{ matrix.task.mc }}-${{ needs.build.outputs.version }}.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          loaders: neoforge
          game-versions: ${{ steps.versions.outputs.mc_versions }}
          game-version-filter: none

      - name: Publish NeoForge to CurseForge
        if: needs.build.outputs.is_marketplace_publishable == 'true' && matrix.task.kind == 'neoforge' && steps.versions.outputs.curseforge_publishable == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: 'Dream Displays ${{ needs.build.outputs.pretty_version }} — NeoForge ${{ matrix.task.mc }}'
          version: neoforge-${{ steps.versions.outputs.publish_mc }}-${{ needs.build.outputs.version }}
          version-type: ${{ needs.build.outputs.is_preview == 'true' && 'alpha' || 'release' }}
          files: build/libs/dreamdisplays-neoforge-${{ matrix.task.mc }}-${{ needs.build.outputs.version }}.jar
          changelog-file: changelog.md
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          loaders: neoforge
          game-versions: ${{ steps.versions.outputs.mc_versions }}

      - name: Download all build artifacts for GitHub Release
        if: needs.build.outputs.is_marketplace_publishable == 'true' && needs.build.outputs.is_release == 'true' && matrix.task.kind == 'paper'
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: build-jars-*
          path: build/libs
          merge-multiple: true

      - name: Create GitHub Release
        if: needs.build.outputs.is_marketplace_publishable == 'true' && needs.build.outputs.is_release == 'true' && matrix.task.kind == 'paper'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: 'Dream Displays ${{ needs.build.outputs.pretty_version }}'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: v${{ needs.build.outputs.version }}
          github-generate-changelog: false
          github-draft: false
          files: build/libs/dreamdisplays-*.jar
          changelog-file: changelog.md

  discord-announce:
    name: Announce release on Discord
    runs-on: ubuntu-latest
    needs: [build, publish]
    if: (needs.build.outputs.is_release == 'true' || needs.build.outputs.is_preview == 'true') && needs.build.outputs.is_marketplace_publishable == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: Send Discord announcement
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ needs.build.outputs.version }}
          PRETTY_VERSION: ${{ needs.build.outputs.pretty_version }}
          IS_PREVIEW: ${{ needs.build.outputs.is_preview }}
        run: |
          python3 - <<'EOF'
          import json
          import os
          import re
          import sys
          import urllib.request

          webhook = os.environ.get("DISCORD_WEBHOOK", "").strip()
          if not webhook:
              sys.exit("DISCORD_WEBHOOK secret is not set.")

          version = os.environ["VERSION"]
          pretty_version = os.environ.get("PRETTY_VERSION", version)
          is_preview = os.environ.get("IS_PREVIEW", "") == "true"

          with open("CHANGELOG.md") as f:
              content = f.read()

          pattern = rf"^# {re.escape(pretty_version)}\s*\n(.*?)(?=\n# \S|\Z)"
          match = re.search(pattern, content, re.DOTALL | re.MULTILINE)
          if not match:
              sys.exit(f"Version {version} not found in CHANGELOG.md.")

          block = match.group(1)

          highlights = []
          hl = re.search(r"^## Highlights\s*\n(.*?)(?=\n## |\Z)", block, re.DOTALL | re.MULTILINE)
          if hl:
              for line in hl.group(1).splitlines():
                  line = line.strip()
                  if line.startswith("- "):
                      highlights.append(line)

          if highlights:
              highlights_text = "\n".join(highlights)
          else:
              highlights_text = "- See the full changelog below for all changes."

          if is_preview:
              intro = (
                  "### Warning\n"
                  "**This is an experimental preview and may be unstable.** "
                  "It may contain bugs, incomplete features, or breaking changes.\n"
              )
          else:
              intro = "A new version of Dream Displays is now available!\n"

          description = (
              f"## Dream Displays {pretty_version}\n"
              f"{intro}"
              "### Highlights\n"
              f"{highlights_text}\n\n"
              "Read the full changelog below for a complete list of changes and download the latest version!"
          )

          payload = {
              "content": "<@&1457091442957877472>",
              "embeds": [
                  {
                      "description": description,
                      "color": 4088314,
                      "footer": {"text": "@arnodoelinger"},
                      "thumbnail": {"url": "https://i.imgur.com/p5bOhsj.png"},
                  }
              ],
              "components": [
                  {
                      "type": 1,
                      "components": [
                          {
                              "type": 2,
                              "style": 5,
                              "label": "Download from Modrinth",
                              "emoji": {"id": "1520861544680783872", "name": "modrinth", "animated": False},
                              "url": "https://modrinth.com/plugin/dreamdisplays/versions",
                          },
                          {
                              "type": 2,
                              "style": 5,
                              "label": "Read full changelog",
                              "emoji": {"name": "\U0001F4DC"},
                              "url": f"https://github.com/{os.environ.get('GITHUB_REPOSITORY', 'arnodoelinger/dreamdisplays')}/releases/tag/v{version}",
                          },
                      ],
                  }
              ],
          }

          url = webhook + ("&" if "?" in webhook else "?") + "with_components=true&wait=true"
          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(url, data=data, headers={"Content-Type": "application/json"})

          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Discord responded with {resp.status}")
          except urllib.error.HTTPError as e:
              sys.exit(f"Discord webhook failed: {e.code} {e.reason}\n{e.read().decode('utf-8', 'replace')}.")
          EOF

name: Dream Displays

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  metadata:
    name: Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_dev: ${{ steps.get_version.outputs.is_dev }}
      is_snapshot: ${{ steps.get_version.outputs.is_snapshot }}
      is_release: ${{ steps.get_version.outputs.is_release }}
      is_marketplace_publishable: ${{ steps.get_version.outputs.is_marketplace_publishable }}
      stonecutter_versions: ${{ steps.stonecutter_versions.outputs.versions_json }}
      build_stonecutter_versions: ${{ steps.stonecutter_versions.outputs.build_versions_json }}
      primary_stonecutter_version: ${{ steps.stonecutter_versions.outputs.primary_version }}
      marketplace_publish_tasks: ${{ steps.stonecutter_versions.outputs.marketplace_tasks_json }}
      native_matrix: ${{ steps.stonecutter_versions.outputs.native_matrix_json }}
      required_native_platforms: ${{ steps.stonecutter_versions.outputs.required_native_platforms }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 1

      - name: Detect Stonecutter versions
        id: stonecutter_versions
        run: |
          python3 - <<'EOF'
          import json, os

          versions = sorted(
              p for p in os.listdir("versions")
              if os.path.isfile(os.path.join("versions", p, "gradle.properties"))
          )

          if not versions:
              raise SystemExit("No Stonecutter versions found")

          tasks = (
              [{"kind": "fabric", "mc": version} for version in versions] +
              [{"kind": "neoforge", "mc": version} for version in versions] +
              [{"kind": "paper", "mc": versions[0]}]
          )

          native_matrix = [
              {
                  "platform": "linux-x64",
                  "runner": "ubuntu-latest",
                  "target": "x86_64-unknown-linux-gnu",
                  "native_library": "libdreamdisplays_native.so",
                  "lav_library": "libdreamdisplays_lav.so",
                  "vcpkg_triplet": "",
              },
              {
                  "platform": "linux-aarch64",
                  "runner": "ubuntu-24.04-arm",
                  "target": "aarch64-unknown-linux-gnu",
                  "native_library": "libdreamdisplays_native.so",
                  "lav_library": "libdreamdisplays_lav.so",
                  "vcpkg_triplet": "",
              },
              {
                  "platform": "macos-x64",
                  "runner": "macos-15-intel",
                  "target": "x86_64-apple-darwin",
                  "native_library": "libdreamdisplays_native.dylib",
                  "lav_library": "libdreamdisplays_lav.dylib",
                  "vcpkg_triplet": "",
              },
              {
                  "platform": "macos-aarch64",
                  "runner": "macos-14",
                  "target": "aarch64-apple-darwin",
                  "native_library": "libdreamdisplays_native.dylib",
                  "lav_library": "libdreamdisplays_lav.dylib",
                  "vcpkg_triplet": "",
              },
              {
                  "platform": "windows-x64",
                  "runner": "windows-latest",
                  "target": "x86_64-pc-windows-msvc",
                  "native_library": "dreamdisplays_native.dll",
                  "lav_library": "dreamdisplays_lav.dll",
                  "vcpkg_triplet": "x64-windows",
              },
              {
                  "platform": "windows-aarch64",
                  "runner": "windows-11-arm",
                  "target": "aarch64-pc-windows-msvc",
                  "native_library": "dreamdisplays_native.dll",
                  "lav_library": "dreamdisplays_lav.dll",
                  "vcpkg_triplet": "arm64-windows",
              },
          ]
          is_pull_request = os.environ.get("GITHUB_EVENT_NAME") == "pull_request"
          build_versions = versions
          required_native_platforms = ["linux-x64"] if is_pull_request else [item["platform"] for item in native_matrix]
          selected_native_matrix = [native_matrix[0]] if is_pull_request else native_matrix

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"versions_json={json.dumps(versions)}\n")
              f.write(f"build_versions_json={json.dumps(build_versions)}\n")
              f.write(f"primary_version={versions[0]}\n")
              f.write(f"marketplace_tasks_json={json.dumps(tasks)}\n")
              f.write(f"native_matrix_json={json.dumps(selected_native_matrix)}\n")
              f.write(f"required_native_platforms={' '.join(required_native_platforms)}\n")
          EOF

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *"-DEV" ]]; then
            echo "is_dev=true" >> $GITHUB_OUTPUT
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "is_marketplace_publishable=false" >> $GITHUB_OUTPUT
          elif [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+)*-SNAPSHOT\.[0-9]+$ ]]; then
            echo "is_dev=false" >> $GITHUB_OUTPUT
            echo "is_snapshot=true" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "is_marketplace_publishable=true" >> $GITHUB_OUTPUT
          elif [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "is_dev=false" >> $GITHUB_OUTPUT
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "is_marketplace_publishable=true" >> $GITHUB_OUTPUT
          else
            echo "is_dev=false" >> $GITHUB_OUTPUT
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "is_marketplace_publishable=false" >> $GITHUB_OUTPUT
          fi

  build-natives:
    name: Build native ${{ matrix.native.platform }}
    runs-on: ${{ matrix.native.runner }}
    needs: metadata
    timeout-minutes: 60
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        native: ${{ fromJSON(needs.metadata.outputs.native_matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 1

      - name: Setup Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.native.target }}"
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: native -> target
          key: ${{ matrix.native.target }}
          cache-on-failure: true

      - name: Install FFmpeg dependencies on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            ffmpeg \
            libavcodec-dev \
            libavdevice-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libclang-dev \
            libswresample-dev \
            libswscale-dev \
            patchelf \
            pkg-config

      - name: Install FFmpeg dependencies on macOS
        if: runner.os == 'macOS'
        run: brew install ffmpeg pkg-config

      - name: Cache vcpkg FFmpeg on Windows
        if: runner.os == 'Windows'
        uses: actions/cache@v5.0.5
        with:
          path: C:/vcpkg/installed
          key: vcpkg-${{ matrix.native.vcpkg_triplet }}-ffmpeg-release-v1

      - name: Install FFmpeg dependencies on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VCPKG_ROOT="${VCPKG_ROOT:-C:/vcpkg}"
          triplet_file="$VCPKG_ROOT/triplets/${{ matrix.native.vcpkg_triplet }}.cmake"
          grep -q 'VCPKG_BUILD_TYPE release' "$triplet_file" || \
            echo 'set(VCPKG_BUILD_TYPE release)' >> "$triplet_file"
          "$VCPKG_ROOT/vcpkg.exe" install "ffmpeg:${{ matrix.native.vcpkg_triplet }}"
          echo "$VCPKG_ROOT/installed/${{ matrix.native.vcpkg_triplet }}/bin" >> "$GITHUB_PATH"
          echo "$VCPKG_ROOT/installed/${{ matrix.native.vcpkg_triplet }}/tools/ffmpeg" >> "$GITHUB_PATH"

      - name: Build native libraries
        shell: bash
        run: |
          cargo build \
            --manifest-path native/Cargo.toml \
            --release \
            --package dreamdisplays-native \
            --package dreamdisplays-lav \
            --locked \
            --target "${{ matrix.native.target }}"
        env:
          VCPKG_ROOT: ${{ runner.os == 'Windows' && 'C:/vcpkg' || '' }}
          VCPKGRS_DYNAMIC: ${{ runner.os == 'Windows' && '1' || '' }}
          VCPKGRS_TRIPLET: ${{ matrix.native.vcpkg_triplet }}

      - name: Test native libraries
        shell: bash
        run: |
          cargo test \
            --manifest-path native/Cargo.toml \
            --release \
            --package dreamdisplays-native \
            --package dreamdisplays-lav \
            --locked \
            --target "${{ matrix.native.target }}"
        env:
          VCPKG_ROOT: ${{ runner.os == 'Windows' && 'C:/vcpkg' || '' }}
          VCPKGRS_DYNAMIC: ${{ runner.os == 'Windows' && '1' || '' }}
          VCPKGRS_TRIPLET: ${{ matrix.native.vcpkg_triplet }}

      - name: Collect native libraries
        shell: bash
        run: |
          set -euo pipefail

          platform="${{ matrix.native.platform }}"
          target="${{ matrix.native.target }}"
          native_library="${{ matrix.native.native_library }}"
          lav_library="${{ matrix.native.lav_library }}"
          vcpkg_triplet="${{ matrix.native.vcpkg_triplet }}"

          release_dir="native/target/$target/release"
          out="native-artifact/dreamdisplays-natives/$platform"
          mkdir -p "$out"

          cp "$release_dir/$native_library" "$out/"
          cp "$release_dir/$lav_library" "$out/"

          shared_library_name() {
            local name
            name="$(basename "$1" | tr '[:upper:]' '[:lower:]')"
            [[ "$name" == *.dll || "$name" == *.dylib || "$name" == *".so"* ]]
          }

          copy_once() {
            local src="$1"
            local dst="$out/$(basename "$src")"
            [[ -f "$src" ]] || return 0
            [[ -f "$dst" ]] || cp "$src" "$dst"
          }

          linux_skip_dependency() {
            local name
            name="$(basename "$1")"
            case "$name" in
              linux-vdso*|ld-linux*|ld64*|libc.so*|libm.so*|libpthread.so*|libdl.so*|librt.so*|libresolv.so*|libgcc_s.so*|libstdc++.so*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          collect_linux_dependencies() {
            local queue=("$out/$native_library" "$out/$lav_library")
            local seen=()

            while ((${#queue[@]})); do
              local item="${queue[0]}"
              queue=("${queue[@]:1}")
              if ((${#seen[@]})); then
                [[ " ${seen[*]} " == *" $item "* ]] && continue
              fi
              seen+=("$item")

              while IFS= read -r dep; do
                [[ -n "$dep" && -f "$dep" ]] || continue
                linux_skip_dependency "$dep" && continue
                copy_once "$dep"
                queue+=("$out/$(basename "$dep")")
              done < <(
                ldd "$item" 2>/dev/null |
                  awk '/=> \// { print $(NF - 1); next } /^[[:space:]]*\// { print $1 }'
              )
            done

            if command -v patchelf >/dev/null 2>&1; then
              while IFS= read -r lib; do
                patchelf --set-rpath '$ORIGIN' "$lib" || true
              done < <(find "$out" -maxdepth 1 -type f -name '*.so*' -print)
            fi
          }

          macos_skip_dependency() {
            case "$1" in
              /System/Library/*|/usr/lib/*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          macos_resolve_dependency() {
            local dep="$1"
            local origin="$2"

            case "$dep" in
              @loader_path/*)
                dep="$(dirname "$origin")/${dep#@loader_path/}"
                ;;
              @rpath/*)
                local name="${dep#@rpath/}"
                local candidate
                for candidate in "$(dirname "$origin")/$name" "/opt/homebrew/lib/$name" "/usr/local/lib/$name" /opt/homebrew/opt/*/lib/"$name" /usr/local/opt/*/lib/"$name"; do
                  if [[ -f "$candidate" ]]; then
                    dep="$candidate"
                    break
                  fi
                done
                ;;
            esac

            [[ -f "$dep" ]] && printf '%s\n' "$dep"
          }

          collect_macos_dependencies() {
            local queue=("$out/$native_library" "$out/$lav_library")
            local seen=()

            while ((${#queue[@]})); do
              local item="${queue[0]}"
              queue=("${queue[@]:1}")
              if ((${#seen[@]})); then
                [[ " ${seen[*]} " == *" $item "* ]] && continue
              fi
              seen+=("$item")

              while IFS= read -r dep; do
                [[ -n "$dep" ]] || continue
                macos_skip_dependency "$dep" && continue
                local resolved
                resolved="$(macos_resolve_dependency "$dep" "$item" || true)"
                [[ -n "$resolved" ]] || continue
                copy_once "$resolved"
                queue+=("$out/$(basename "$resolved")")
              done < <(otool -L "$item" | tail -n +2 | awk '{ print $1 }')
            done

            while IFS= read -r binary; do
              install_name_tool -id "@loader_path/$(basename "$binary")" "$binary" 2>/dev/null || true
              while IFS= read -r dep; do
                [[ -n "$dep" ]] || continue
                macos_skip_dependency "$dep" && continue
                local resolved
                resolved="$(macos_resolve_dependency "$dep" "$binary" || true)"
                [[ -n "$resolved" ]] || continue
                install_name_tool -change "$dep" "@loader_path/$(basename "$resolved")" "$binary" 2>/dev/null || true
              done < <(otool -L "$binary" | tail -n +2 | awk '{ print $1 }')
              codesign --force --sign - "$binary" >/dev/null 2>&1 || true
            done < <(find "$out" -maxdepth 1 -type f \( -name '*.dylib' -o -name "$lav_library" \) -print)
          }

          collect_windows_dependencies() {
            local root="${VCPKG_ROOT:-C:/vcpkg}"
            local bin="$root/installed/$vcpkg_triplet/bin"
            if [[ ! -d "$bin" ]]; then
              echo "Missing vcpkg bin directory: $bin" >&2
              exit 1
            fi

            local dumpbin=""
            if command -v dumpbin.exe >/dev/null 2>&1; then
              dumpbin="$(command -v dumpbin.exe)"
            else
              dumpbin="$(find "/c/Program Files/Microsoft Visual Studio" "/c/Program Files (x86)/Microsoft Visual Studio" \
                -path '*/VC/Tools/MSVC/*/bin/Host*/x64/dumpbin.exe' -o \
                -path '*/VC/Tools/MSVC/*/bin/Host*/arm64/dumpbin.exe' 2>/dev/null | head -n 1 || true)"
            fi

            if [[ -n "$dumpbin" && -f "$dumpbin" ]]; then
              local queue=("$out/$native_library" "$out/$lav_library")
              local seen=()

              while ((${#queue[@]})); do
                local item="${queue[0]}"
                queue=("${queue[@]:1}")
                if ((${#seen[@]})); then
                  [[ " ${seen[*]} " == *" $item "* ]] && continue
                fi
                seen+=("$item")

                while IFS= read -r dep; do
                  [[ -n "$dep" ]] || continue
                  local src="$bin/$dep"
                  [[ -f "$src" ]] || continue
                  copy_once "$src"
                  queue+=("$out/$dep")
                done < <(
                  "$dumpbin" //DEPENDENTS "$item" 2>/dev/null |
                    tr -d '\r' |
                    awk '/^[[:space:]]*[A-Za-z0-9_.-]+\.dll$/ { print $1 }'
                )
              done
              return
            fi

            local allowlist='(avutil|swresample|swscale|avcodec|avformat|avfilter|avdevice|x264|x265|vpx|dav1d|opus|mp3lame|ssl|crypto|zlib|bz2|lzma|brotli|iconv|zstd|xml2|ass|freetype|fribidi|harfbuzz|vorbis|ogg|theora|webp|svtav1|aom|soxr|speex|openjp2|srt|ssh)'
            while IFS= read -r dll; do
              name="$(basename "$dll" | tr '[:upper:]' '[:lower:]')"
              if [[ "$name" =~ $allowlist ]]; then
                copy_once "$dll"
              fi
            done < <(find "$bin" -maxdepth 1 -type f -name '*.dll' -print)
          }

          collect_license_metadata() {
            local license_dir="$out/licenses"
            mkdir -p "$license_dir"

            if command -v ffmpeg >/dev/null 2>&1; then
              ffmpeg -hide_banner -version > "$license_dir/ffmpeg-version.txt" 2>&1 || true
              ffmpeg -hide_banner -L > "$license_dir/ffmpeg-license.txt" 2>&1 || true
            fi

            case "${RUNNER_OS:-}" in
              Linux)
                cp /usr/share/doc/ffmpeg/copyright "$license_dir/ffmpeg-debian-copyright.txt" 2>/dev/null || true
                ;;
              macOS)
                if command -v brew >/dev/null 2>&1; then
                  brew info --json=v2 ffmpeg > "$license_dir/ffmpeg-homebrew.json" 2>/dev/null || true
                fi
                ;;
              Windows)
                local root="${VCPKG_ROOT:-C:/vcpkg}"
                cp "$root/installed/$vcpkg_triplet/share/ffmpeg/copyright" "$license_dir/ffmpeg-vcpkg-copyright.txt" 2>/dev/null || true
                ;;
            esac

            if [[ ! -s "$license_dir/ffmpeg-license.txt" ]]; then
              echo "Missing FFmpeg license metadata for $platform" >&2
              exit 1
            fi
          }

          case "${RUNNER_OS:-}" in
            Linux)
              collect_linux_dependencies
              ;;
            macOS)
              collect_macos_dependencies
              ;;
            Windows)
              collect_windows_dependencies
              ;;
            *)
              echo "Unsupported RUNNER_OS=${RUNNER_OS:-}" >&2
              exit 1
              ;;
          esac
          collect_license_metadata

          required_components=(avutil swresample swscale avcodec avformat avfilter avdevice)
          for required in "$native_library" "$lav_library"; do
            test -f "$out/$required"
          done

          for component in "${required_components[@]}"; do
            found=false
            for lib in "$out"/*; do
              [[ -f "$lib" ]] || continue
              shared_library_name "$lib" || continue
              name="$(basename "$lib" | tr '[:upper:]' '[:lower:]')"
              if [[ "$name" == *"$component"* ]]; then
                found=true
                break
              fi
            done
            if [[ "$found" != true ]]; then
              echo "Missing FFmpeg component $component in $out" >&2
              exit 1
            fi
          done

          find "$out" -maxdepth 1 -type f -print | sort
          tar -cf "native-artifact/native-$platform.tar" -C "$out/.." "$platform"
        env:
          VCPKG_ROOT: ${{ runner.os == 'Windows' && 'C:/vcpkg' || '' }}

      - name: Upload native libraries
        uses: actions/upload-artifact@v7.0.1
        with:
          name: native-${{ matrix.native.platform }}
          path: native-artifact/native-${{ matrix.native.platform }}.tar
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  build:
    name: Build ${{ matrix.mc }}
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build-natives
    timeout-minutes: 15
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        mc: ${{ fromJSON(needs.metadata.outputs.build_stonecutter_versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 1

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6.1.0

      - name: Setup JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 25
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Select Stonecutter version
        run: echo "${{ matrix.mc }}" > versions/active.txt

      - name: Download native archives
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: native-*
          path: native/build/native-archives
          merge-multiple: true

      - name: Extract native bundle
        run: |
          mkdir -p native/build/ci-bundle/dreamdisplays-natives
          for archive in native/build/native-archives/native-*.tar; do
            test -f "$archive"
            tar -xf "$archive" -C native/build/ci-bundle/dreamdisplays-natives
          done

      - name: Validate native bundle
        run: |
          native_name() {
            case "$1" in
              windows-*) printf '%s\n' dreamdisplays_native.dll ;;
              macos-*) printf '%s\n' libdreamdisplays_native.dylib ;;
              *) printf '%s\n' libdreamdisplays_native.so ;;
            esac
          }
          lav_name() {
            case "$1" in
              windows-*) printf '%s\n' dreamdisplays_lav.dll ;;
              macos-*) printf '%s\n' libdreamdisplays_lav.dylib ;;
              *) printf '%s\n' libdreamdisplays_lav.so ;;
            esac
          }
          for platform in $REQUIRED_NATIVE_PLATFORMS; do
            test -f "native/build/ci-bundle/dreamdisplays-natives/$platform/$(native_name "$platform")"
            test -f "native/build/ci-bundle/dreamdisplays-natives/$platform/$(lav_name "$platform")"
            test -s "native/build/ci-bundle/dreamdisplays-natives/$platform/licenses/ffmpeg-license.txt"
            for component in avutil swresample swscale avcodec avformat avfilter avdevice; do
              find "native/build/ci-bundle/dreamdisplays-natives/$platform" -maxdepth 1 -type f \
                | grep -E "(${component}).*(\\.dll|\\.dylib|\\.so)" >/dev/null
            done
          done
          find native/build/ci-bundle/dreamdisplays-natives -maxdepth 2 -type f -print | sort
        env:
          REQUIRED_NATIVE_PLATFORMS: ${{ needs.metadata.outputs.required_native_platforms }}

      - name: Build with Gradle
        run: |
          ./gradlew \
            :client:fabric:publishJar \
            :client:neoforge:shadowJar \
            :server:shadowJar \
            --no-daemon \
            --parallel \
            --build-cache
        env:
          DREAMDISPLAYS_REQUIRE_NATIVES: "true"
          DREAMDISPLAYS_REQUIRED_NATIVE_PLATFORMS: ${{ needs.metadata.outputs.required_native_platforms }}
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx4G

      - name: Verify jar native bundle
        run: |
          python3 - <<'EOF'
          from pathlib import Path
          import os
          from zipfile import ZipFile

          mc = "${{ matrix.mc }}"
          version = "${{ needs.metadata.outputs.version }}"
          ffmpeg_components = ["avutil", "swresample", "swscale", "avcodec", "avformat", "avfilter", "avdevice"]
          platforms = os.environ["REQUIRED_NATIVE_PLATFORMS"].split()

          def native_name(platform: str) -> str:
              if platform.startswith("windows-"):
                  return "dreamdisplays_native.dll"
              if platform.startswith("macos-"):
                  return "libdreamdisplays_native.dylib"
              return "libdreamdisplays_native.so"

          def lav_name(platform: str) -> str:
              if platform.startswith("windows-"):
                  return "dreamdisplays_lav.dll"
              if platform.startswith("macos-"):
                  return "libdreamdisplays_lav.dylib"
              return "libdreamdisplays_lav.so"

          expected = [
              f"{platform}/{name}"
              for platform in platforms
              for name in (native_name(platform), lav_name(platform), "licenses/ffmpeg-license.txt")
          ]

          for loader in ("fabric", "neoforge"):
              jar = Path(f"build/libs/dreamdisplays-{loader}-{mc}-{version}.jar")
              if not jar.is_file():
                  raise SystemExit(f"Missing jar: {jar}")

              with ZipFile(jar) as zip_file:
                  names = set(zip_file.namelist())

              missing = [
                  f"dreamdisplays-natives/{entry}"
                  for entry in expected
                  if f"dreamdisplays-natives/{entry}" not in names
              ]
              if missing:
                  raise SystemExit(f"{jar} is missing native entries: {missing}.")

              for platform in platforms:
                  platform_entries = [
                      name.rsplit("/", 1)[-1].lower()
                      for name in names
                      if name.startswith(f"dreamdisplays-natives/{platform}/")
                  ]
                  missing_components = [
                      component
                      for component in ffmpeg_components
                      if not any(component in entry and (entry.endswith(".dll") or entry.endswith(".dylib") or ".so" in entry) for entry in platform_entries)
                  ]
                  if missing_components:
                      raise SystemExit(f"{jar} is missing FFmpeg components for {platform}: {missing_components}.")
          EOF
        env:
          REQUIRED_NATIVE_PLATFORMS: ${{ needs.metadata.outputs.required_native_platforms }}

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp build/libs/dreamdisplays-*.jar artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-jars-${{ matrix.mc }}
          path: artifacts/*.jar
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  github-prerelease:
    name: Publish GitHub pre-release
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build
    if: github.event_name == 'push' && (needs.metadata.outputs.is_dev == 'true' || needs.metadata.outputs.is_snapshot == 'true')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: build-jars-*
          path: build/libs
          merge-multiple: true

      - name: Extract snapshot changelog
        if: needs.metadata.outputs.is_snapshot == 'true'
        run: |
          python3 - <<'EOF'
          import re
          import sys

          with open("CHANGELOG.md") as f:
              content = f.read()

          version = "${{ needs.metadata.outputs.version }}"
          pattern = rf"^# Version {re.escape(version)}\s*\n(.*?)(?=\n# Version |\Z)"
          match = re.search(pattern, content, re.DOTALL | re.MULTILINE)

          if not match:
              with open("changelog.md", "w") as f:
                  f.write("")
              sys.exit(0)

          block = match.group(1)
          sections = re.split(r"^## ", block, flags=re.MULTILINE)
          lines = []

          for section in sections:
              if not section.strip():
                  continue

              header, _, body = section.partition("\n")
              lines.append(f"## {header.strip()}")

              for item in body.splitlines():
                  item = item.strip()
                  if item:
                      lines.append(item)

              lines.append("")

          with open("changelog.md", "w") as f:
              f.write("\n".join(lines).strip() + "\n")
          EOF

      - name: Publish dev pre-release
        if: needs.metadata.outputs.is_dev == 'true'
        run: |
          TAG="v${{ needs.metadata.outputs.version }}"
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh release create "$TAG" --repo "${{ github.repository }}" --title "${{ needs.metadata.outputs.version }}" --prerelease --notes "" build/libs/dreamdisplays-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish snapshot pre-release
        if: needs.metadata.outputs.is_snapshot == 'true'
        run: |
          TAG="v${{ needs.metadata.outputs.version }}"
          gh release create "$TAG" --repo "${{ github.repository }}" --title "${{ needs.metadata.outputs.version }}" --prerelease --notes-file changelog.md build/libs/dreamdisplays-*.jar \
          || gh release upload "$TAG" build/libs/dreamdisplays-*.jar --repo "${{ github.repository }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish ${{ matrix.task.kind }} ${{ matrix.task.mc }}
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build
    if: github.event_name == 'push' && needs.metadata.outputs.is_marketplace_publishable == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        task: ${{ fromJSON(needs.metadata.outputs.marketplace_publish_tasks) }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-jars-${{ matrix.task.mc }}
          path: build/libs

      - name: Extract versions
        id: versions
        run: |
          python3 - <<'EOF'
          import os
          import re

          mc = "${{ matrix.task.mc }}"
          props = {}

          with open(f"versions/{mc}/gradle.properties") as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith("#") or "=" not in line:
                      continue

                  key, value = line.split("=", 1)
                  props[key.strip()] = value.strip()

          minecraft_version = props.get("minecraft.version", mc)
          base_mc = minecraft_version.split("-", 1)[0]
          publish_mc = "1.21" if base_mc.startswith("1.21.") else base_mc
          curseforge_publishable = (
              re.fullmatch(r"\d+(?:\.\d+)*", minecraft_version) is not None
              and minecraft_version != "1.21.11"
          )

          paper_1_21 = ["1.21"] + [f"1.21.{p}" for p in range(1, 12)]
          paper_26_1 = ["26.1", "26.1.1", "26.1.2"]
          paper_versions = paper_1_21 + paper_26_1

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"mc={mc}\n")
              f.write(f"publish_mc={publish_mc}\n")
              f.write(f"curseforge_publishable={str(curseforge_publishable).lower()}\n")
              f.write("mc_versions<<VERSIONS_EOF\n")
              f.write(minecraft_version + "\n")
              f.write("VERSIONS_EOF\n")
              f.write("paper_versions<<VERSIONS_EOF\n")
              f.write("\n".join(paper_versions) + "\n")
              f.write("VERSIONS_EOF\n")
          EOF

      - name: Extract changelog
        if: needs.metadata.outputs.is_release == 'true' || needs.metadata.outputs.is_snapshot == 'true'
        run: |
          python3 - <<'EOF'
          import os
          import re
          import sys

          with open("CHANGELOG.md") as f:
              content = f.read()

          version = "${{ needs.metadata.outputs.version }}"
          is_snapshot = "${{ needs.metadata.outputs.is_snapshot }}" == "true"

          pattern = rf"^# Version {re.escape(version)}\s*\n(.*?)(?=\n# Version |\Z)"
          match = re.search(pattern, content, re.DOTALL | re.MULTILINE)

          if not match:
              if is_snapshot:
                  with open("changelog.md", "w") as f:
                      f.write("")
                  sys.exit(0)

              sys.exit(f"Version {version} not found in CHANGELOG.md")

          block = match.group(1)
          sections = re.split(r"^## ", block, flags=re.MULTILINE)
          lines = []

          for section in sections:
              if not section.strip():
                  continue

              header, _, body = section.partition("\n")
              lines.append(f"## {header.strip()}")

              for item in body.splitlines():
                  item = item.strip()
                  if item:
                      lines.append(item)

              lines.append("")

          with open("changelog.md", "w") as f:
              f.write("\n".join(lines).strip() + "\n")
          EOF

      - name: Publish Paper
        if: matrix.task.kind == 'paper'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[Paper] Dream Displays ${{ needs.metadata.outputs.version }}'
          version: paper-${{ needs.metadata.outputs.version }}
          version-type: ${{ needs.metadata.outputs.is_snapshot == 'true' && 'alpha' || 'release' }}
          files: build/libs/dreamdisplays-paper-${{ needs.metadata.outputs.version }}.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          loaders: |
            folia
            paper
            purpur
          game-versions: ${{ steps.versions.outputs.paper_versions }}
          game-version-filter: none

      - name: Publish Fabric to Modrinth
        if: matrix.task.kind == 'fabric'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[Fabric ${{ steps.versions.outputs.publish_mc }}] Dream Displays ${{ needs.metadata.outputs.version }}'
          version: fabric-${{ steps.versions.outputs.publish_mc }}-${{ needs.metadata.outputs.version }}
          version-type: ${{ needs.metadata.outputs.is_snapshot == 'true' && 'alpha' || 'release' }}
          files: build/libs/dreamdisplays-fabric-${{ matrix.task.mc }}-${{ needs.metadata.outputs.version }}.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          loaders: |
            fabric
            quilt
          game-versions: ${{ steps.versions.outputs.mc_versions }}
          game-version-filter: none
          dependencies: |
            fabric-api(required){modrinth:P7dR8mSH}

      - name: Publish Fabric to CurseForge
        if: matrix.task.kind == 'fabric' && steps.versions.outputs.curseforge_publishable == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[Fabric ${{ steps.versions.outputs.publish_mc }}] Dream Displays ${{ needs.metadata.outputs.version }}'
          version: fabric-${{ steps.versions.outputs.publish_mc }}-${{ needs.metadata.outputs.version }}
          version-type: ${{ needs.metadata.outputs.is_snapshot == 'true' && 'alpha' || 'release' }}
          files: build/libs/dreamdisplays-fabric-${{ matrix.task.mc }}-${{ needs.metadata.outputs.version }}.jar
          changelog-file: changelog.md
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          loaders: |
            fabric
            quilt
          game-versions: ${{ steps.versions.outputs.mc_versions }}
          dependencies: |
            fabric-api(required){curseforge:306612}

      - name: Publish NeoForge to Modrinth
        if: matrix.task.kind == 'neoforge'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[NeoForge ${{ steps.versions.outputs.publish_mc }}] Dream Displays ${{ needs.metadata.outputs.version }}'
          version: neoforge-${{ steps.versions.outputs.publish_mc }}-${{ needs.metadata.outputs.version }}
          version-type: ${{ needs.metadata.outputs.is_snapshot == 'true' && 'alpha' || 'release' }}
          files: build/libs/dreamdisplays-neoforge-${{ matrix.task.mc }}-${{ needs.metadata.outputs.version }}.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          loaders: neoforge
          game-versions: ${{ steps.versions.outputs.mc_versions }}
          game-version-filter: none

      - name: Publish NeoForge to CurseForge
        if: matrix.task.kind == 'neoforge' && steps.versions.outputs.curseforge_publishable == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[NeoForge ${{ steps.versions.outputs.publish_mc }}] Dream Displays ${{ needs.metadata.outputs.version }}'
          version: neoforge-${{ steps.versions.outputs.publish_mc }}-${{ needs.metadata.outputs.version }}
          version-type: ${{ needs.metadata.outputs.is_snapshot == 'true' && 'alpha' || 'release' }}
          files: build/libs/dreamdisplays-neoforge-${{ matrix.task.mc }}-${{ needs.metadata.outputs.version }}.jar
          changelog-file: changelog.md
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          loaders: neoforge
          game-versions: ${{ steps.versions.outputs.mc_versions }}

      - name: Download all build artifacts for GitHub Release
        if: needs.metadata.outputs.is_release == 'true' && matrix.task.kind == 'paper'
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: build-jars-*
          path: build/libs
          merge-multiple: true

      - name: Create GitHub Release
        if: needs.metadata.outputs.is_release == 'true' && matrix.task.kind == 'paper'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: v${{ needs.metadata.outputs.version }}
          github-generate-changelog: false
          github-draft: false
          files: build/libs/dreamdisplays-*.jar
          changelog-file: changelog.md

name: Dream Displays

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_dev: ${{ steps.get_version.outputs.is_dev }}
      is_snapshot: ${{ steps.get_version.outputs.is_snapshot }}
      is_release: ${{ steps.get_version.outputs.is_release }}
      stonecutter_versions: ${{ steps.stonecutter_versions.outputs.versions_json }}
      primary_stonecutter_version: ${{ steps.stonecutter_versions.outputs.primary_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Detect Stonecutter versions
        id: stonecutter_versions
        run: |
          python3 - <<'EOF'
          import json, os
          versions = sorted(
              p for p in os.listdir("versions")
              if os.path.isfile(os.path.join("versions", p, "gradle.properties"))
          )
          if not versions:
              raise SystemExit("No Stonecutter versions found")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"versions_json={json.dumps(versions)}\n")
              f.write(f"primary_version={versions[0]}\n")
          EOF

      - name: Build with Gradle
        run: |
          rm -rf artifacts
          mkdir -p artifacts
          python3 - <<'EOF'
          import json, os, glob, shutil, subprocess

          versions = json.loads(os.environ["STONECUTTER_VERSIONS"])
          for version in versions:
              with open("versions/active.txt", "w") as f:
                  f.write(version + "\n")
              print(f"::group::Build {version}", flush=True)
              result = subprocess.run([
                  "./gradlew", "clean",
                  ":client:fabric:shadowJar",
                  ":client:neoforge:shadowJar",
                  ":server:shadowJar",
                  "--no-daemon", "--parallel", "--rerun-tasks",
              ])
              print("::endgroup::", flush=True)
              if result.returncode != 0:
                  raise SystemExit(result.returncode)
              jars = glob.glob("build/libs/dreamdisplays-*.jar")
              if not jars:
                  raise SystemExit(f"No JARs found in build/libs/ for version {version}")
              for jar in jars:
                  shutil.copy(jar, "artifacts/")
          EOF
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx4G
          STONECUTTER_VERSIONS: ${{ steps.stonecutter_versions.outputs.versions_json }}

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *"-DEV"* ]]; then
            echo "is_dev=true"      >> $GITHUB_OUTPUT
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
            echo "is_release=false"  >> $GITHUB_OUTPUT
          elif [[ "$VERSION" == *"-SNAPSHOT."* ]]; then
            echo "is_dev=false"      >> $GITHUB_OUTPUT
            echo "is_snapshot=true"  >> $GITHUB_OUTPUT
            echo "is_release=false"  >> $GITHUB_OUTPUT
          else
            echo "is_dev=false"      >> $GITHUB_OUTPUT
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
            echo "is_release=true"   >> $GITHUB_OUTPUT
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-jars
          path: artifacts/*.jar
          if-no-files-found: error

  github-prerelease:
    name: Publish GitHub pre-release
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push' && (needs.build.outputs.is_dev == 'true' || needs.build.outputs.is_snapshot == 'true')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: build-jars
          path: build/libs

      - name: Publish dev pre-release
        if: needs.build.outputs.is_dev == 'true'
        run: |
          TAG="v${{ needs.build.outputs.version }}"
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh release create "$TAG" --repo "${{ github.repository }}" --title "${{ needs.build.outputs.version }}" --prerelease --notes "" build/libs/dreamdisplays-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish snapshot pre-release
        if: needs.build.outputs.is_snapshot == 'true'
        run: |
          TAG="v${{ needs.build.outputs.version }}"
          gh release create "$TAG" --repo "${{ github.repository }}" --title "${{ needs.build.outputs.version }}" --prerelease build/libs/dreamdisplays-*.jar \
          || gh release upload "$TAG" build/libs/dreamdisplays-*.jar --repo "${{ github.repository }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        mc: ${{ fromJSON(needs.build.outputs.stonecutter_versions) }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-jars
          path: build/libs

      - name: Extract versions
        id: versions
        run: |
          python3 - <<'EOF'
          import os

          mc = "${{ matrix.mc }}"
          props = {}
          with open(f"versions/{mc}/gradle.properties") as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith("#") or "=" not in line:
                      continue
                  key, value = line.split("=", 1)
                  props[key.strip()] = value.strip()

          publish_mc = "26.2" if mc.startswith("26.2") else props.get("fabric.minecraft.dependency", mc)

          paper_1_21 = ["1.21"] + [f"1.21.{p}" for p in range(1, 12)]
          paper_26_1 = ["26.1", "26.1.1", "26.1.2"]
          paper_versions = paper_1_21 + paper_26_1 + ["26.2"]

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"mc={mc}\n")
              f.write(f"publish_mc={publish_mc}\n")
              f.write("mc_versions<<VERSIONS_EOF\n")
              f.write(publish_mc + "\n")
              f.write("VERSIONS_EOF\n")
              f.write("paper_versions<<VERSIONS_EOF\n")
              f.write("\n".join(paper_versions) + "\n")
              f.write("VERSIONS_EOF\n")
          EOF

      - name: Extract changelog
        if: needs.build.outputs.is_release == 'true' || needs.build.outputs.is_snapshot == 'true'
        run: |
          python3 - <<'EOF'
          import re, sys, os

          with open("CHANGELOG.md") as f:
              content = f.read()

          version = "${{ needs.build.outputs.version }}"
          is_snapshot = "${{ needs.build.outputs.is_snapshot }}" == "true"

          pattern = rf"^# Version {re.escape(version)}\s*\n(.*?)(?=\n# Version |\Z)"
          match = re.search(pattern, content, re.DOTALL | re.MULTILINE)
          if not match:
              if is_snapshot:
                  with open("changelog.md", "w") as f:
                      f.write("")
                  sys.exit(0)
              sys.exit(f"Version {version} not found in CHANGELOG.md")

          block = match.group(1)
          sections = re.split(r"^## ", block, flags=re.MULTILINE)
          lines = []
          for section in sections:
              if not section.strip():
                  continue
              header, _, body = section.partition("\n")
              lines.append(f"## {header.strip()}")
              for item in body.splitlines():
                  item = item.strip()
                  if item:
                      lines.append(item)
              lines.append("")

          with open("changelog.md", "w") as f:
              f.write("\n".join(lines).strip() + "\n")
          EOF

      - name: Publish Fabric
        if: needs.build.outputs.is_release == 'true' || needs.build.outputs.is_snapshot == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[Fabric ${{ steps.versions.outputs.publish_mc }}] Dream Displays ${{ needs.build.outputs.version }}'
          version: fabric-${{ matrix.mc }}-${{ needs.build.outputs.version }}
          version-type: ${{ needs.build.outputs.is_snapshot == 'true' && 'alpha' || 'release' }}
          files: build/libs/dreamdisplays-fabric-${{ matrix.mc }}-${{ needs.build.outputs.version }}.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          loaders: |
            fabric
            quilt
          game-versions: ${{ steps.versions.outputs.mc_versions }}
          dependencies: |
            fabric-api(required){modrinth:P7dR8mSH}{curseforge:306612}

      - name: Publish NeoForge
        if: needs.build.outputs.is_release == 'true' || needs.build.outputs.is_snapshot == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[NeoForge ${{ steps.versions.outputs.publish_mc }}] Dream Displays ${{ needs.build.outputs.version }}'
          version: neoforge-${{ matrix.mc }}-${{ needs.build.outputs.version }}
          version-type: ${{ needs.build.outputs.is_snapshot == 'true' && 'alpha' || 'release' }}
          files: build/libs/dreamdisplays-neoforge-${{ matrix.mc }}-${{ needs.build.outputs.version }}.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          loaders: neoforge
          game-versions: ${{ steps.versions.outputs.mc_versions }}

      - name: Publish Paper
        if: (needs.build.outputs.is_release == 'true' || needs.build.outputs.is_snapshot == 'true') && matrix.mc == needs.build.outputs.primary_stonecutter_version
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[Paper] Dream Displays ${{ needs.build.outputs.version }}'
          version: paper-${{ needs.build.outputs.version }}
          version-type: ${{ needs.build.outputs.is_snapshot == 'true' && 'alpha' || 'release' }}
          files: build/libs/dreamdisplays-paper-${{ matrix.mc }}-${{ needs.build.outputs.version }}.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          loaders: |
            folia
            paper
            purpur
          game-versions: ${{ steps.versions.outputs.paper_versions }}

      - name: Create GitHub Release
        if: needs.build.outputs.is_release == 'true' && matrix.mc == needs.build.outputs.primary_stonecutter_version
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: v${{ needs.build.outputs.version }}
          github-generate-changelog: false
          github-draft: false
          files: build/libs/dreamdisplays-*.jar
          changelog-file: changelog.md

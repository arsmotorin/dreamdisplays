name: Dream Displays

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_dev: ${{ steps.get_version.outputs.is_dev }}
      is_snapshot: ${{ steps.get_version.outputs.is_snapshot }}
      is_release: ${{ steps.get_version.outputs.is_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --parallel --build-cache
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Xmx4G

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *"-DEV"* ]]; then
            echo "is_dev=true"      >> $GITHUB_OUTPUT
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
            echo "is_release=false"  >> $GITHUB_OUTPUT
          elif [[ "$VERSION" == *"-SNAPSHOT."* ]]; then
            echo "is_dev=false"      >> $GITHUB_OUTPUT
            echo "is_snapshot=true"  >> $GITHUB_OUTPUT
            echo "is_release=false"  >> $GITHUB_OUTPUT
          else
            echo "is_dev=false"      >> $GITHUB_OUTPUT
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
            echo "is_release=true"   >> $GITHUB_OUTPUT
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-jars
          path: build/libs/*.jar
          if-no-files-found: warn

  publish:
    name: Publish
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-jars
          path: build/libs

      - name: Extract versions
        id: versions
        run: |
          python3 - <<'EOF'
          import os, re

          with open("gradle/libs.versions.toml") as f:
              content = f.read()

          mc = re.search(r'^minecraft\s*=\s*"([^"]+)"', content, re.MULTILINE).group(1)
          parts = mc.split(".")
          base = f"{parts[0]}.{parts[1]}"
          patch = int(parts[2]) if len(parts) > 2 else 0

          mc_range = [base] + [f"{base}.{p}" for p in range(1, patch + 1)]
          paper_1_21 = ["1.21"] + [f"1.21.{p}" for p in range(1, 12)]

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"mc={mc}\n")
              f.write(f"mc_minor={base}\n")
              f.write("mc_versions<<VERSIONS_EOF\n")
              f.write("\n".join(mc_range) + "\n")
              f.write("VERSIONS_EOF\n")
              f.write("paper_versions<<VERSIONS_EOF\n")
              f.write("\n".join(paper_1_21 + mc_range) + "\n")
              f.write("VERSIONS_EOF\n")
          EOF

      - name: Publish dev pre-release
        if: needs.build.outputs.is_dev == 'true'
        run: |
          TAG="v${{ needs.build.outputs.version }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" --title "${{ needs.build.outputs.version }}" --prerelease --notes "" build/libs/dreamdisplays-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish snapshot pre-release
        if: needs.build.outputs.is_snapshot == 'true'
        run: |
          TAG="v${{ needs.build.outputs.version }}"
          gh release create "$TAG" --title "${{ needs.build.outputs.version }}" --prerelease build/libs/dreamdisplays-*.jar \
          || gh release upload "$TAG" build/libs/dreamdisplays-*.jar --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract changelog
        if: needs.build.outputs.is_release == 'true'
        run: |
          python3 - <<'EOF'
          import re, sys

          with open("CHANGELOG.md") as f:
              content = f.read()

          version = "${{ needs.build.outputs.version }}"
          pattern = rf"^# Version {re.escape(version)}\s*\n(.*?)(?=\n# Version |\Z)"
          match = re.search(pattern, content, re.DOTALL | re.MULTILINE)
          if not match:
              sys.exit(f"Version {version} not found in CHANGELOG.md")

          block = match.group(1)
          sections = re.split(r"^## ", block, flags=re.MULTILINE)
          lines = []
          for section in sections:
              if not section.strip():
                  continue
              header, _, body = section.partition("\n")
              lines.append(f"## {header.strip()}")
              for item in body.splitlines():
                  item = item.strip()
                  if item:
                      lines.append(item)
              lines.append("")

          with open("changelog.md", "w") as f:
              f.write("\n".join(lines).strip() + "\n")
          EOF

      - name: Publish Fabric
        if: needs.build.outputs.is_release == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[Fabric ${{ steps.versions.outputs.mc }}] Dream Displays ${{ needs.build.outputs.version }}'
          version: fabric-${{ needs.build.outputs.version }}
          version-type: release
          files: build/libs/dreamdisplays-fabric-*.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          loaders: |
            fabric
            quilt
          game-versions: ${{ steps.versions.outputs.mc_versions }}
          dependencies: |
            fabric-api(required){modrinth:P7dR8mSH}{curseforge:306612}

      - name: Publish NeoForge
        if: needs.build.outputs.is_release == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[NeoForge ${{ steps.versions.outputs.mc }}] Dream Displays ${{ needs.build.outputs.version }}'
          version: neoforge-${{ needs.build.outputs.version }}
          version-type: release
          files: build/libs/dreamdisplays-neoforge-*.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          loaders: neoforge
          game-versions: ${{ steps.versions.outputs.mc_versions }}

      - name: Publish Paper
        if: needs.build.outputs.is_release == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[Paper ${{ steps.versions.outputs.mc_minor }}.x] Dream Displays ${{ needs.build.outputs.version }}'
          version: paper-${{ needs.build.outputs.version }}
          version-type: release
          files: build/libs/dreamdisplays-paper-*.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          loaders: |
            folia
            paper
            purpur
          game-versions: ${{ steps.versions.outputs.paper_versions }}

      - name: Create GitHub Release
        if: needs.build.outputs.is_release == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: v${{ needs.build.outputs.version }}
          github-generate-changelog: false
          github-draft: false
          files: build/libs/dreamdisplays-*.jar
          changelog-file: changelog.md

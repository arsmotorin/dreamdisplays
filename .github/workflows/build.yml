name: Dream Displays

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --parallel --build-cache
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Xmx4G

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-jars
          path: build/libs/*.jar
          if-no-files-found: warn

  dev:
    name: Dev
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push' && contains(needs.build.outputs.version, '-DEV')
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-jars
          path: build/libs

      - name: Update dev tag
        run: |
          VERSION=${{ needs.build.outputs.version }}
          TAG="v${VERSION}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" --title "$VERSION" --prerelease --notes "" build/libs/dreamdisplays-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snapshot:
    name: Snapshot
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push' && contains(needs.build.outputs.version, '-SNAPSHOT.')
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-jars
          path: build/libs

      - name: Create pre-release
        run: |
          VERSION=${{ needs.build.outputs.version }}
          TAG="v${VERSION}"
          gh release create "$TAG" --title "$VERSION" --prerelease build/libs/dreamdisplays-*.jar \
          || gh release upload "$TAG" build/libs/dreamdisplays-*.jar --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: build
    if: |
      github.event_name == 'push' &&
      !contains(needs.build.outputs.version, '-SNAPSHOT') &&
      !contains(needs.build.outputs.version, '-DEV')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-jars
          path: build/libs

      - name: Extract versions
        id: versions
        run: |
          MC=$(grep 'fabricMinecraft\s*=' gradle/libs.versions.toml | head -1 | cut -d'"' -f2)
          echo "mc=$MC" >> $GITHUB_OUTPUT
          echo "mc_minor=${MC%.*}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          python3 - <<'EOF'
          import re, sys

          with open("CHANGELOG.md") as f:
              content = f.read()

          version = "${{ needs.build.outputs.version }}"
          pattern = rf"^# Version {re.escape(version)}\s*\n(.*?)(?=\n# Version |\Z)"
          match = re.search(pattern, content, re.DOTALL | re.MULTILINE)
          if not match:
              sys.exit(f"Version {version} not found in CHANGELOG.md")

          block = match.group(1)
          sections = re.split(r"^## ", block, flags=re.MULTILINE)
          lines = []
          for section in sections:
              if not section.strip():
                  continue
              header, _, body = section.partition("\n")
              lines.append(f"## {header.strip()}")
              for item in body.splitlines():
                  item = item.strip()
                  if item:
                      lines.append(item)
              lines.append("")

          with open("changelog.md", "w") as f:
              f.write("\n".join(lines).strip() + "\n")
          EOF

      - name: Publish Fabric
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[Fabric ${{ steps.versions.outputs.mc }}] Dream Displays ${{ needs.build.outputs.version }}'
          version: fabric-${{ needs.build.outputs.version }}
          version-type: release
          files: build/libs/dreamdisplays-fabric-*.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          loaders: |
            fabric
            quilt
          game-versions: ${{ steps.versions.outputs.mc }}
          dependencies: |
            fabric-api(required){modrinth:P7dR8mSH}{curseforge:306612}

      - name: Publish NeoForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[NeoForge ${{ steps.versions.outputs.mc }}] Dream Displays ${{ needs.build.outputs.version }}'
          version: neoforge-${{ needs.build.outputs.version }}
          version-type: release
          files: build/libs/dreamdisplays-neoforge-*.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          loaders: neoforge
          game-versions: ${{ steps.versions.outputs.mc }}

      - name: Publish Paper
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: '[Paper ${{ steps.versions.outputs.mc_minor }}.x] Dream Displays ${{ needs.build.outputs.version }}'
          version: paper-${{ needs.build.outputs.version }}
          version-type: release
          files: build/libs/dreamdisplays-paper-*.jar
          changelog-file: changelog.md
          modrinth-id: dreamdisplays
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          loaders: |
            folia
            paper
            purpur
          game-versions: |
            ${{ steps.versions.outputs.mc_minor }}
            ${{ steps.versions.outputs.mc }}

      - name: Create GitHub Release
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: v${{ needs.build.outputs.version }}
          github-generate-changelog: false
          github-draft: false
          files: build/libs/dreamdisplays-*.jar
          changelog-file: changelog.md

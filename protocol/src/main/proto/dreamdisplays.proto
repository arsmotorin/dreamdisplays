syntax = "proto2";

package dreamdisplays.v2;

// Envelope
message Envelope {
  optional int32 type = 1;
  optional bytes payload = 2;
}

// com.dreamdisplays.protocol.ClientHello
message ClientHello {
  optional int32 protocolVersion = 1;
  optional string modVersion = 2;
  optional bool supportsPopout = 3;
  optional bool supportsHardwareDecode = 4;
  optional bool supportsHighResolution = 5;
  optional int32 maxTextureSize = 6;
  repeated string supportedCodecs = 7;
  optional bool supportsPip = 8;
  optional bool supportsAudio = 9;
}

// com.dreamdisplays.protocol.ServerHello
message ServerHello {
  optional int32 protocolVersion = 1;
  optional bool isPremium = 2;
  optional bool isAdmin = 3;
  optional bool isReportingEnabled = 4;
  optional int32 maxDisplays = 6;
  repeated string allowedFeatures = 7;
}

// com.dreamdisplays.protocol.DisplayInfo
message DisplayInfo {
  optional Uuid id = 1;
  optional Uuid ownerId = 2;
  optional sint32 x = 3;
  optional sint32 y = 4;
  optional sint32 z = 5;
  optional int32 width = 6;
  optional int32 height = 7;
  optional string url = 8;
  optional int32 facing = 9;
  optional bool isSync = 10;
  optional string lang = 11;
  optional bool isLocked = 12;
}

// com.dreamdisplays.protocol.DisplayDelete
message DisplayDelete {
  optional Uuid id = 1;
}

// com.dreamdisplays.protocol.DisplaySync
message DisplaySync {
  optional Uuid id = 1;
  optional bool isSync = 2;
  optional bool isPaused = 3;
  optional int64 currentTimeMs = 4;
  optional int64 durationMs = 5;
}

// com.dreamdisplays.protocol.RequestSync
message RequestSync {
  optional Uuid id = 1;
}

// com.dreamdisplays.protocol.SetVideo
message SetVideo {
  optional Uuid id = 1;
  optional string url = 2;
  optional string lang = 3;
}

// com.dreamdisplays.protocol.SetLocked
message SetLocked {
  optional Uuid id = 1;
  optional bool locked = 2;
}

// com.dreamdisplays.protocol.ReportDisplay
message ReportDisplay {
  optional Uuid id = 1;
}

// com.dreamdisplays.protocol.SetDisplaysEnabled
message SetDisplaysEnabled {
  optional bool enabled = 1;
}

// com.dreamdisplays.protocol.ClearCache
message ClearCache {
  repeated Uuid ids = 1;
}

// UUID
message Uuid {
  optional fixed64 msb = 1;
  optional fixed64 lsb = 2;
}
